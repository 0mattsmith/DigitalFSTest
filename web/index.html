<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1180" />
  <title>DFSQ Practice</title>
  <meta name="description" content="Practice exam application for Pearson Digital Functional Skills (Entry Level 3 and Level 1). Runs entirely in your browser — no install, no sign-up. All work saved locally." />
  <link rel="icon" href="favicon.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles/main.css" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#003057" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="DFSQ Practice" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body>
  <div id="player" class="player">
    <div class="player-titlebar" id="player-titlebar">
      <!-- macOS-style traffic light controls (hidden on web — browser handles window) -->
      <div class="tb-dots" id="tb-dots" aria-hidden="true">
        <button class="tb-dot tb-dot-r" id="tb-dot-close"    title="Close"    aria-label="Close window"></button>
        <button class="tb-dot tb-dot-y" id="tb-dot-minimize" title="Minimise" aria-label="Minimise window"></button>
        <button class="tb-dot tb-dot-g" id="tb-dot-maximize" title="Maximise" aria-label="Toggle maximise"></button>
      </div>
      <span class="tb-title">Test Player Preview</span>
      <span class="tb-spacer"></span>
      <button id="tb-install" class="tb-install hide" title="Install DFSQ Practice to your home screen or desktop" aria-label="Install app">
        <svg class="tb-cam-icon" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
          <path fill="currentColor" d="M12 3a1 1 0 0 1 1 1v9.585l3.293-3.292a1 1 0 1 1 1.414 1.414l-5 5a1 1 0 0 1-1.414 0l-5-5a1 1 0 1 1 1.414-1.414L11 13.585V4a1 1 0 0 1 1-1zm-7 16h14a1 1 0 1 1 0 2H5a1 1 0 1 1 0-2z"/>
        </svg>
        <span class="tb-cam-label">Install app</span>
      </button>
      <button id="tb-screenshot" class="tb-screenshot" title="Take a screenshot of this page (Cmd/Ctrl+Shift+S)" aria-label="Screenshot">
        <svg class="tb-cam-icon" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
          <path fill="currentColor" d="M9 3l-2 2H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3l-2-2H9zm3 5a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
        </svg>
        <span class="tb-cam-label">Screenshot</span>
      </button>
      <!-- Windows / Linux style controls (hidden on web — browser handles window) -->
      <div class="tb-ctls" id="tb-ctls">
        <button class="tb-ctl tb-min"   title="Minimise" aria-label="Minimise window">&minus;</button>
        <button class="tb-ctl tb-max"   title="Maximise" aria-label="Toggle maximise">&#9633;</button>
        <button class="tb-ctl tb-close" title="Close"    aria-label="Close window">&times;</button>
      </div>
    </div>

    <div id="screen" class="screen"></div>

    <div id="footerbar" class="footerbar">
      <div class="fb-left">
        <button class="fb-icon" title="Accessibility" aria-label="Accessibility">&#9737;</button>
        <button class="fb-icon" title="Help" aria-label="Help">?</button>
        <button class="fb-icon" title="Reset" aria-label="Reset">&#8634;</button>
        <button class="fb-icon" title="Flag" aria-label="Flag">&#9873;</button>
      </div>
      <div class="fb-center">
        <button id="btn-prev" class="orange-btn">&#9664; Previous</button>
        <span id="page-counter" class="page-counter">&nbsp;</span>
        <button id="btn-next" class="orange-btn">Next &#9654;</button>
        <span id="timer" class="timer"><span class="hourglass">&#8987;</span><span id="timer-text">00:00</span></span>
      </div>
      <div class="fb-right">
        <button id="btn-marks" class="orange-btn">Marks</button>
        <button id="btn-save" class="orange-btn">Save</button>
      </div>
    </div>
  </div>

  <!-- html2canvas powers the in-app screenshot button. Loaded async so it
       doesn't block the rest of the app. Capture button waits until ready. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
          crossorigin="anonymous" defer></script>

  <!-- Polyfill window.dfsq for the browser. MUST run before app.js. -->
  <script src="web-bridge.js"></script>

  <!-- Reuse the same renderer module the Electron app uses. -->
  <script type="module" src="app.js"></script>

  <!-- Register the service worker so the app works offline and can be
       installed to the home screen as a PWA. Loaded after the main script
       so the first run isn't delayed. -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js')
          .then(function (reg) {
            console.log('[dfsq] Service worker registered, scope:', reg.scope);
          })
          .catch(function (err) {
            console.warn('[dfsq] Service worker registration failed:', err);
          });
      });
    }
  </script>
</body>
</html>
