name: Deploy web app to GitHub Pages

# Runs whenever main is updated, or on demand from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Required so the action can publish the built site.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-flight deploy if a new push lands.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build web bundle
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # build-web.js has no dependencies of its own — it just shells out to
      # the Node standard library — so we don't need `npm install`.
      - name: Build docs/ folder
        run: node build-web.js

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publish
        id: deployment
        uses: actions/deploy-pages@v4
